################
### VARIABLES ###
################

$scripts = $HOME/.config/hypr/scripts
$mainMod = SUPER # Sets "Windows" key as main modifier

# See https://wiki.hyprland.org/Configuring/Keywords/
$terminal = kitty
$fileManager = nautilus
$menu = rofi -show
$screenshot_dir = ~/Pictures/Screenshots

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt6ct

################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=eDP-1,1920x1080@120,0x0,1,transform,0
monitor=HDMI-A-1,1920x1080@60,1920x0,1.5,transform,1
monitor=,preferred,0x-1080,1

##################
### WORKSPACES ###
##################

workspace = 1, monitor:eDP-1
workspace = 2, monitor:eDP-1
workspace = 3, monitor:eDP-1
workspace = 4, monitor:eDP-1
workspace = 5, monitor:eDP-1
workspace = 6, monitor:eDP-1
workspace = special:alttab, gapsout:0, gapsin:0, bordersize:0

#################
### AUTOSTART ###
#################

exec-once = nm-applet --indicator &
exec-once = blueman-applet &
exec-once = waybar & swaync & hypridle
exec-once = hyprpaper &
exec-once = /usr/libexec/polkit-mate-authentication-agent-1
exec-once = hyprctl setcursor Bibata-Modern-Classic 24
exec-once = wl-paste --watch cliphist store
exec-once = bash ~/.config/hypr/scripts/hyprwalchange.sh
exec-once = bash ~/.config/hypr/scripts/inactive-kb-toggle.sh
# exec-once = hyprpm reload -n

# For libadwaita gtk4 apps you can use this command:
exec-once = gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"
exec-once = gsettings set org.gnome.desktop.interface gtk-theme "adw-gtk3-dark"

# Hyprland Alt Tab feature
exec-once = foot --server -c $HOME/.config/foot/foot.ini

#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    # follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
    }

}

# https://wiki.hyprland.org/Configuring/Gestures
gesture = 3, horizontal, workspace

# Example per-device config
# See:
# https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hyprland.org/Configuring/Variables/

general {
    gaps_out = 0
    gaps_in = 0
    border_size = 1

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types
    # for info about colors
    # col.active_border = rgba(89ddffee) rgba(82aaffee) 45deg
    col.active_border = rgba(82aaffff)
    col.inactive_border = rgba(4a4a4cff)

    # Enable resizing windows by clicking and
    # dragging on borders and gaps
    resize_on_border = true

    # See https://wiki.hyprland.org/Configuring/Tearing/
    # before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    # rounding = 8
    rounding = 0

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    # dim_inactive = true
    # dim_strength = 0.3

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 4
        passes = 2
        vibrancy = 0.1696
        new_optimizations = true
    }

    shadow {
        enabled = true
        range = 20
        render_power = 4
        color = rgba(1a1a1aee)
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    $speedVar = 2
    enabled = true

    # Default animations
    # https://wiki.hyprland.org/Configuring/Animations/

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, $speedVar, myBezier
    animation = windowsOut, 1, $speedVar, default, popin 80%
    animation = border, 1, $speedVar, default
    animation = borderangle, 1, $speedVar, default
    animation = fade, 1, $speedVar, default
    animation = workspaces, 1, $speedVar, default
}

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    # Master switch for pseudotiling.
    # Bound to mainMod + P in keybinds below.
    pseudotile = true
    force_split = 2
    preserve_split = true
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    # Set to 0 or 1 to disable the anime mascot
    force_default_wallpaper = 0
    # Disable the random hyprland logo / anime girl
    disable_hyprland_logo = true
    # Disables the random hyprland logo / anime girl
}

##############################
### WINDOW AND LAYER RULES ###
##############################

# wlogout
layerrule = blur, logout_dialog

layerrule = blur,hyprswitch
layerrule = ignorezero,hyprswitch
layerrule = ignorealpha 0.5,hyprswitch

layerrule = blur,kitty

layerrule = blur,waybar
layerrule = ignorezero,waybar
layerrule = ignorealpha 0.5, waybar

layerrule = blur,rofi
layerrule = ignorezero,rofi
layerrule = dimaround,rofi

layerrule = blur, swaync-control-center
layerrule = blur, swaync-notification-window
layerrule = ignorezero, swaync-control-center
layerrule = ignorezero, swaync-notification-window
layerrule = ignorealpha 0.5, swaync-control-center
layerrule = ignorealpha 0.5, swaync-notification-window

# Ignore maximize requests from apps. You'll probably like this.
windowrulev2 = suppressevent maximize, class:.*

# Blur issues
windowrulev2 = noblur,class:^()$,title:^()$

# Fix some dragging issues with XWayland
windowrulev2 = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0

# XWayland Extras
windowrulev2 = opacity 0.0 override 0.0 override,class:^(xwaylandvideobridge)$
windowrulev2 = noanim,class:^(xwaylandvideobridge)$
windowrulev2 = noinitialfocus,class:^(xwaylandvideobridge)$
windowrulev2 = maxsize 1 1,class:^(xwaylandvideobridge)$
windowrulev2 = noblur,class:^(xwaylandvideobridge)$

# Discord Overlayed AppImage
windowrulev2 = pin,class:^(Overlayed)$
windowrulev2 = float,class:^(Overlayed)$
windowrulev2 = noblur,class:^(Overlayed)$
windowrulev2 = noshadow,class:^(Overlayed)$
windowrulev2 = opacity 1.0,class:^(Overlayed)$
windowrulev2 = move 1510 8,class:^(Overlayed)$
windowrulev2 = size 402 1036,class:^(Overlayed)$
windowrulev2 = noborder,class:^(Overlayed)$
windowrulev2 = nofocus,class:^(Overlayed)$
# windowrulev2 = stayfocused,class:^(Overlayed)$

# Alt Tab
windowrulev2 = noanim, class:^(alttab)$
windowrulev2 = stayfocused, class:^(alttab)$
windowrulev2 = workspace special:alttab, class:^(alttab)$
windowrulev2 = bordersize 0, class:^(alttab)$

# Prevent screen share flickering in OBS
windowrulev2 = immediate, class:^(obs)$

###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

# General
bind = $mainMod, return, exec, $terminal
bind = $mainMod, B, exec, zen
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, M, exit,
# bind = $mainMod, E, exec, $fileManager
bind = $mainMod, F, fullscreen
bind = $mainMod SHIFT, F, togglefloating
bind = $mainMod, space, exec, $menu
bind = $mainMod, slash, exec, rofi -show window
bind = $mainMod, /, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, V, togglesplit, # dwindle
bind = $mainMod SHIFT, R, exec, hyprctl reload
bind = $mainMod SHIFT, backspace, exec, hyprlock
bind = $mainMod, Print, exec, hyprshot -m output -o $screenshot_dir; $scripts/sounds.sh --screenshot
bind = $mainMod SHIFT, Print, exec, hyprshot -m window -o $screenshot_dir; $scripts/sounds.sh --screenshot
bind = , Print, exec, hyprshot -m region -o $screenshot_dir; $scripts/sounds.sh --screenshot
bind = $mainMod SHIFT, N, exec, swaync-client -t -sw
bind = CTRL ALT, Delete, exec, $scripts/wlogout.sh
bind = $mainMod, W, exec, $scripts/toggle-waybar.sh
bind = $mainMod SHIFT, W, exec, $scripts/hyprwalchange.sh
bind = $mainMod ALT, R, exec, $scripts/refresh.sh
bind = $mainMod SHIFT, C, exec, $scripts/clip-manager.sh
# bind = $mainMod SHIFT, C, exec, rofi -modi "calc" -show calc
bind = $mainMod SHIFT, E, exec, $scripts/emoji-picker.sh

# File Manager
bind = $mainMod, E, exec, $fileManager

# Audio & Media
bind = $mainMod, bracketleft, exec, $scripts/volume-control.sh --dec
bind = $mainMod, bracketright, exec, $scripts/volume-control.sh --inc
bind = $mainMod, backslash, exec, $scripts/volume-control.sh --toggle
bind = $mainMod, apostrophe, exec, $scripts/volume-control.sh --toggle-mic
bind = $mainMod SHIFT, bracketleft, exec, $scripts/media-control.sh --prv
bind = $mainMod SHIFT, bracketright, exec, $scripts/media-control.sh --nxt
bind = $mainMod SHIFT, backslash, exec, $scripts/media-control.sh --pause

# Move focus
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Resize Window
bind = $mainMod ALT, H, resizeactive, -50 0
bind = $mainMod ALT, L, resizeactive, 50 0
bind = $mainMod ALT, K, resizeactive, 0 -50
bind = $mainMod ALT, J, resizeactive, 0 50

# Move Window
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# Switch workspaces with mainMod + [0-8]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8

# Move active window to a workspace with mainMod + SHIFT + [0-8]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8

# Special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bind = $mainMod, 9, workspace, e+1
bind = $mainMod, 0, workspace, e-1
bind = $mainMod, left, movetoworkspace, -1
bind = $mainMod, right, movetoworkspace, +1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Move window to monitors
bind = $mainMod, comma, focusmonitor, -1
bind = $mainMod, period, focusmonitor, +1
bind = $mainMod SHIFT, left, movewindow, mon:-1
bind = $mainMod SHIFT, right, movewindow, mon:+1

# Magnifier
bind = $mainMod ALT, mouse_down, exec, $scripts/magnifier.sh wheel-down
bind = $mainMod ALT, mouse_up, exec, $scripts/magnifier.sh wheel-up

# Laptop multimedia keys
bindel = ,XF86AudioRaiseVolume, exec, $scripts/volume-control.sh --inc
bindel = ,XF86AudioLowerVolume, exec, $scripts/volume-control.sh --dec
bindel = ,XF86AudioMute, exec, $scripts/volume-control.sh --toggle
bindel = ,XF86AudioMicMute, exec, $scripts/volume-control.sh --toggle-mic
bindel = ,XF86MonBrightnessUp, exec, $scripts/brightness.sh --inc
bindel = ,XF86MonBrightnessDown, exec, $scripts/brightness.sh --dec
bind = $mainMod SHIFT, 9, exec, $scripts/brightness.sh --dec
bind = $mainMod SHIFT, 0, exec, $scripts/brightness.sh --inc
bind = $mainMod SHIFT, minus, exec, $scripts/brightness.sh --dec
bind = $mainMod SHIFT, equal, exec, $scripts/brightness.sh --inc

# Requires playerctl
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
####### ALT-TAB (SUBMAP) #####
##############################

bind = ALT, TAB, exec, $HOME/.config/hypr/scripts/alttab/enable.sh 'down'
bind = ALT SHIFT, TAB, exec, $HOME/.config/hypr/scripts/alttab/enable.sh 'up'

submap = alttab
bind = ALT, tab, sendshortcut, , tab, class:alttab
bind = ALT SHIFT, tab, sendshortcut, shift, tab, class:alttab

bindrt = ALT, ALT_L, exec, $HOME/.config/hypr/scripts/alttab/disable.sh ; hyprctl -q dispatch sendshortcut , return,class:alttab
bindrt = ALT SHIFT, ALT_L, exec, $HOME/.config/hypr/scripts/alttab/disable.sh ; hyprctl -q dispatch sendshortcut , return,class:alttab
bind = ALT, Return, exec, $HOME/.config/hypr/scripts/alttab/disable.sh ; hyprctl -q dispatch sendshortcut , return, class:alttab
bind = ALT SHIFT, Return, exec, $HOME/.config/hypr/scripts/alttab/disable.sh ; hyprctl -q dispatch sendshortcut , return, class:alttab
bind = ALT, escape, exec, $HOME/.config/hypr/scripts/alttab/disable.sh ; hyprctl -q dispatch sendshortcut , escape,class:alttab
bind = ALT SHIFT, escape, exec, $HOME/.config/hypr/scripts/alttab/disable.sh ; hyprctl -q dispatch sendshortcut , escape,class:alttab
submap = reset
